<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AwayDay ORM Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f7f9fc;
  --surface:#ffffff;
  --surface2:#eef4f7;
  --border:#cce0e8;
  --text:#003a54;
  --muted:#5a8fa3;
  --accent:#005C83;
  --accent2:#F3CE3C;
  --green:#00875a;
  --red:#d0021b;
  --yellow:#D6AD0D;
  --orange:#F9972B;
  --sky:#B5DCE1;
  --font:'DM Sans',system-ui,sans-serif
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap');
.topbar{background:#005C83;border-bottom:none;padding:0 24px;display:flex;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px #005C8340}
.logo{padding:10px 20px 10px 0;border-right:1px solid rgba(255,255,255,0.25);margin-right:8px;display:flex;align-items:center}
.logo span{color:var(--accent)}
.navtabs{display:flex;gap:2px;flex:1;overflow-x:auto;padding:8px 0}
.navtabs::-webkit-scrollbar{display:none}
.ntab{background:transparent;border:none;color:rgba(255,255,255,0.75);padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12.5px;font-weight:500;font-family:var(--font);white-space:nowrap;transition:all .15s}
.ntab:hover{background:rgba(255,255,255,0.15);color:#ffffff}
.ntab.active{background:#F3CE3C;color:#003a54}
.emp-badge{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:20px;padding:4px 12px;font-size:12px;color:rgba(255,255,255,0.9);margin-left:auto;white-space:nowrap}
.page{display:none;padding:20px 24px;max-width:1400px;margin:0 auto}
.page.active{display:block}
.panel{background:#ffffff;border:1px solid #cce0e8;border-radius:12px;padding:18px 20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,92,131,0.07)}
.panel h2{font-size:14px;font-weight:600;margin-bottom:4px}
.panel .sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.chart-wrap{position:relative;height:220px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:800px){.two-col{grid-template-columns:1fr}}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.stat{background:#ffffff;border:1px solid #cce0e8;border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,92,131,0.06)}
.stat .label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat .val{font-size:24px;font-weight:700}
.stat .val.green{color:#00875a}.stat .val.yellow{color:#D6AD0D}.stat .val.red{color:#d0021b}.stat .val.blue{color:#005C83}
.ninebox{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;min-width:560px}
.nb-cell{background:#f0f7fa;border:1px solid #cce0e8;border-radius:8px;padding:10px;min-height:80px}
.nb-cell-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.nb-dots{display:flex;flex-wrap:wrap;gap:3px}
.nb-dot{width:8px;height:8px;border-radius:50%;cursor:pointer;position:relative;transition:transform .15s;flex-shrink:0}
.nb-dot:hover{transform:scale(2.2);z-index:20}
.nb-dot[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:#1a1f2e;border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--text);white-space:nowrap;z-index:100;pointer-events:none}
.cell-color-9{background:#e8f8f0}.cell-color-8{background:#e8f8f0}.cell-color-7{background:#fffbe6}
.cell-color-6{background:#e8f8f0}.cell-color-5{background:#fffbe6}.cell-color-4{background:#fde8eb}
.cell-color-3{background:#fffbe6}.cell-color-2{background:#fde8eb}.cell-color-1{background:#fde8eb}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:#5a8fa3;text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid #cce0e8;white-space:nowrap}
.tbl td{padding:8px 10px;border-bottom:1px solid #e8f2f5;color:#003a54}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#eef8fb}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.badge-green{background:#e6f5ef;color:#00875a}.badge-yellow{background:#fff8e1;color:#9a7200}
.badge-red{background:#fde8eb;color:#d0021b}.badge-blue{background:#e0eef5;color:#005C83}
.badge-orange{background:#fff3e6;color:#c06a00}.badge-purple{background:#f3eeff;color:#6030a0}
.group-header{background:#eef4f7;border:1px solid #cce0e8;border-left:4px solid #005C83;border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.gname{font-size:14px;font-weight:600}.gstats{font-size:12px;color:var(--muted)}
.rank-badge{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:#F3CE3C;color:#003a54;flex-shrink:0}
.ci-card{background:#f7fbfd;border:1px solid #cce0e8;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.ci-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.ci-name{font-size:14px;font-weight:600}
.ci-pattern{font-size:12px;font-weight:600;padding:2px 10px;border-radius:20px;border:1px solid}
.eu-bar{display:flex;align-items:center;gap:8px;margin:6px 0}
.eu-label{font-size:11px;color:var(--muted);width:60px;flex-shrink:0}
.eu-track{flex:1;height:6px;background:#cce0e8;border-radius:3px;overflow:hidden}
.eu-fill{height:100%;border-radius:3px}
.eu-num{font-size:11px;font-weight:600;width:26px;text-align:right;flex-shrink:0}
.trait-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.trait-tag{font-size:10px;padding:2px 6px;border-radius:4px;background:#e0eef5;border:1px solid #b0d4e3;color:#005C83}
.stress-list{margin-top:8px}
.stress-item{font-size:11px;color:var(--yellow);padding:2px 0}
.stress-item::before{content:"⚠ "}
.ci-notes{font-size:12px;color:#5a8fa3;margin-top:8px;line-height:1.5;border-top:1px solid #cce0e8;padding-top:8px}
.ci-9box{font-size:12px;margin-top:8px;padding:6px 10px;background:#ffffff;border-radius:6px;border:1px solid #cce0e8}
.admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.admin-card{background:#f7fbfd;border:1px solid #cce0e8;border-radius:10px;padding:14px 16px}
.admin-card h3{font-size:13px;font-weight:600;margin-bottom:10px}
.admin-field{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #cce0e8;font-size:12px}
.admin-field:last-child{border-bottom:none}
.admin-field label{color:var(--muted)}
.admin-field input{background:#f7f9fc;border:1px solid #cce0e8;color:#003a54;padding:3px 8px;border-radius:4px;width:110px;font-size:12px;font-family:var(--font)}
.admin-save{margin-top:10px;background:#005C83;border:none;color:#fff;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:var(--font);font-weight:500}
</style>
</head>

var charts={};
function mkChart(id,cfg){if(charts[id])charts[id].destroy();var c=document.getElementById(id);if(!c)return;charts[id]=new Chart(c.getContext('2d'),cfg)}
function pAvg(e){return e.scores.perfAvg||0}
function qAvg(e){return e.scores.potAvg||0}
function ov(e){return(pAvg(e)+qAvg(e))/2}
function cell9(p,q){var pr=p>=3.34?'H':p>=2.67?'M':'L';var qr=q>=3.34?'H':q>=2.67?'M':'L';return{HH:9,MH:8,LH:7,HM:6,MM:5,LM:4,HL:3,ML:2,LL:1}[pr+qr]||5}
function cell9rel(all,e){
  var ps=[...all].map(pAvg).sort((a,b)=>a-b);
  var qs=[...all].map(qAvg).sort((a,b)=>a-b);
  var n=all.length,pi=ps.lastIndexOf(pAvg(e)),qi=qs.lastIndexOf(qAvg(e));
  var pr=pi>=n*2/3?'H':pi>=n/3?'M':'L';
  var qr=qi>=n*2/3?'H':qi>=n/3?'M':'L';
  return{HH:9,MH:8,LH:7,HM:6,MM:5,LM:4,HL:3,ML:2,LL:1}[pr+qr]||5;
}

function perfBadge(v){if(v===null||v===undefined||isNaN(v))return '—';var s=v.toFixed(2);if(v>=3.34)return '<span class="badge badge-green">'+s+'</span>';if(v>=2.67)return '<span class="badge badge-yellow">'+s+'</span>';return '<span class="badge badge-red">'+s+'</span>'}

function renderOverview(){
  var el=document.getElementById('page-overview');
  var n=employees.length;
  var avgP=employees.reduce((s,e)=>s+pAvg(e),0)/n;
  var avgQ=employees.reduce((s,e)=>s+qAvg(e),0)/n;
  var stars=employees.filter(e=>cell9(pAvg(e),qAvg(e))>=8).length;

  var evals=[...new Set(employees.map(e=>e.header.evaluator))];
  var patDist={};employees.forEach(e=>{var l=cellNames[cell9(pAvg(e),qAvg(e))];patDist[l]=(patDist[l]||0)+1});
  var order=[9,8,7,6,5,4,3,2,1].map(c=>cellNames[c]);
  var patLabels=order.filter(l=>patDist[l]);
  var regMap={};employees.forEach(e=>{var r=e.header.region||'—';regMap[r]=(regMap[r]||0)+1});
  el.innerHTML=`<div class="stat-row">

function renderCI(){

  });
  var avgGap=(CI_DATA.reduce(function(s,c){return s+Math.abs(c.traits_eu-c.jobs_eu)},0)/CI_DATA.length).toFixed(1);
  var highRisk=CI_DATA.filter(function(c){return Math.abs(c.traits_eu-c.jobs_eu)>25}).length;
  var patMap={};CI_DATA.forEach(function(c){patMap[c.pattern]=(patMap[c.pattern]||0)+1});

    return{pat:p,n:items.length,
      avgP:items.reduce(function(s,i){return s+i.perf},0)/items.length,
      avgQ:items.reduce(function(s,i){return s+i.pot},0)/items.length,
      avgO:items.reduce(function(s,i){return s+i.overall},0)/items.length,
      avgGap:items.reduce(function(s,i){return s+i.gap},0)/items.length};
  }).sort(function(a,b){return b.avgO-a.avgO});

  // EU gap bucket analysis
  var gapBuckets=[
    {label:'Well Aligned (0–5)',lo:0,hi:5},
    {label:'Slight Stretch (6–15)',lo:6,hi:15},
    {label:'Moderate Stretch (16–25)',lo:16,hi:25},
    {label:'High Stress Risk (26+)',lo:26,hi:999}
  ].map(function(b){
    var items=matched.filter(function(m){return m.gap>=b.lo&&m.gap<=b.hi});
    return{label:b.label,n:items.length,
      avgP:items.length?items.reduce(function(s,i){return s+i.perf},0)/items.length:null,
      avgQ:items.length?items.reduce(function(s,i){return s+i.pot},0)/items.length:null};
  });

  el.innerHTML=`<div class="stat-row">

    <div class="stat"><div class="label">Matched to 9-Box</div><div class="val green">${matched.length}</div></div>

    <div class="stat"><div class="label">High Stress Risk</div><div class="val ${highRisk>0?'red':'green'}">${highRisk}</div></div>
  </div>

  <div class="panel" style="border-left:4px solid #F3CE3C">
    <h2>🔍 Correlation Findings</h2>
    <div class="sub">Based on ${matched.length} employees with both a CI profile and a completed 9-Box assessment</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:14px">
      <div style="background:var(--surface2);border-radius:8px;padding:12px 14px;border:1px solid var(--border)">

function renderAdmin(){

  document.getElementById('admin-grid').innerHTML=sorted.map((e,i)=>{

    return`<div class="admin-card"><h3>${e.header.name}</h3>

function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');

  var fns={overview:renderOverview,ninebox:renderNinebox,nineboxrel:renderNineboxRel,scorecard:renderScorecard,salary:renderSalary,ci:renderCI,churn:renderChurn,admin:renderAdmin,competencies:renderCompetencies,triage:renderTriage,tenure:renderTenure};
  if(fns[name])fns[name]();
}

e Core Performer line.", "SUCCESSION: Potentially strong — must be in the right role first."]}, {"tier": "GAP or RESTRUCTURE — At Risk (21 ORMs)", "items": ["WHO: William Arenz, Ashley Resendiz, Crystal Sanders, Andrea O'Donnell, Kelly Brusky, Crystal Waddell, Alisha Whittaker (ORR), Arielle Busch, Hannah Goldberg, Elizabeth Wilkins, Gracila Saenz, Joseph Danyali, Danica Byers, Scott Muller, Wendy Johnson, Kegan Shire, Edward Mack, Angel Afalava, Benjamin Pullen, Noah Ellington, Tanya Bottorf (1·At Risk)", "WHY THEY'RE HERE: Lowest perf AND potential scores. Persistent KPI misses, owner churn risk, and multi-quarter underperformance. 6 are flagged for role restructure before GAP: Scott Muller, Edward Mack, Noah Ellington, Alisha Whittaker, Tanya Bottorf, Jarett Bousquet.", "RESTRUCTURE-FIRST CASES (evaluate before issuing GAP): Scott Muller, Edward Mack, Noah Ellington, Alisha Whittaker, Tanya Bottorf — skills assessment + transparent career conversation before formal plan.", "0-30 DAYS: Triage each ORM: GAP case or restructure case? For GAP: issue formal Growth & Accountability Plan with 30/60/90 milestones, weekly manager check-ins, documented KPI targets. For restructure: skills assessment + career conversation.", "30-90 DAYS: GAP milestones reviewed at each checkpoint. Decision at day 90: goals met (close GAP), extend with cause, role restructure, or separation. Manager and DOR aligned before any decision.", "TRAINING: KPI Accountability Workshop, Owner Escalation Handling, Emotional Labor Support where applicable. Note: training alone will not resolve performance for true At Risk cases.", "OWNER RISK: These 21 ORMs carry active owner portfolios. LORM must audit their books immediately — identify owners at churn risk for proactive outreach.", "MANAGER NOTE: 21 simultaneous GAPs require DOR coordination to protect LORM bandwidth. Stagger review cadences and prioritize the most critical portfolios first."]}];

/* ---- stats helpers ---- */
function _nums(a){return a.filter(function(v){return v!==null&&v!==undefined&&!isNaN(v);});}
function _mean(a){a=_nums(a);return a.length?a.reduce(function(s,v){return s+v;},0)/a.length:0;}
function _median(a){a=_nums(a).slice().sort(function(x,y){return x-y;});if(!a.length)return 0;var m=Math.floor(a.length/2);return a.length%2?a[m]:(a[m-1]+a[m])/2;}
function _pstd(a){a=_nums(a);if(a.length<2)return 0;var m=_mean(a);return Math.sqrt(a.reduce(function(s,v){return s+(v-m)*(v-m);},0)/a.length);}
function _corr(xs,ys){var n=xs.length;if(n<3)return NaN;var mx=_mean(xs),my=_mean(ys);var cov=0,sx=0,sy=0;for(var i=0;i<n;i++){cov+=(xs[i]-mx)*(ys[i]-my);sx+=(xs[i]-mx)*(xs[i]-mx);sy+=(ys[i]-my)*(ys[i]-my);}return(sx&&sy)?cov/Math.sqrt(sx*sy):NaN;}
function itemVals(emps,key){var o=[];emps.forEach(function(e){var v=e.responses[key];if(v!==null&&v!==undefined)o.push(v);});return o;}
function pairVals(emps,a,b){var xs=[],ys=[];emps.forEach(function(e){var x=e.responses[a],y=e.responses[b];if(x!=null&&y!=null){xs.push(x);ys.push(y);}});return[xs,ys];}
function corrColor(c){if(isNaN(c))return '#eef3f6';var a=Math.min(1,Math.abs(c));if(c>=0)return 'rgba(0,92,131,'+(0.12+0.78*a).toFixed(2)+')';return 'rgba(208,2,27,'+(0.12+0.78*a).toFixed(2)+')';}

/* ---- per-tab analysis inclusion (exclude cross-market outliers) ---- */
var EXCLUDED_SALARY={}, EXCLUDED_TENURE={};
function includedSalary(e){return !EXCLUDED_SALARY[e.header.name];}
function includedTenure(e){return !EXCLUDED_TENURE[e.header.name];}
function inclusionPanel(tab,list,valFn,fmtFn,metricLabel){
  var store=tab==='salary'?EXCLUDED_SALARY:EXCLUDED_TENURE;
  var inc=list.filter(function(e){return !store[e.header.name];}).length;
  var sorted=list.slice().sort(function(a,b){return (valFn(b)||0)-(valFn(a)||0);});
  var btn='style="font-size:11px;padding:4px 10px;border-radius:12px;border:1px solid var(--border);background:#fff;cursor:pointer;margin-left:6px"';
  var h='<div class="panel"><h2>Analysis Inclusion</h2>'+
    '<div class="sub">Toggle an employee off to exclude them from every calculation on this tab &mdash; useful for cross-market outliers whose role or market is not comparable. '+
    '<strong style="color:var(--accent)">'+inc+' of '+list.length+'</strong> included.'+
    '<button onclick="setAllIncl(\''+tab+'\',true)" '+btn+'>Include all</button>'+
    '<button onclick="setAllIncl(\''+tab+'\',false)" '+btn+'>Exclude all</button></div>'+
    '<div style="max-height:300px;overflow:auto;margin-top:10px;border:1px solid var(--border);border-radius:8px">'+
    '<table class="tbl" style="margin:0"><thead><tr><th style="text-align:center">In</th><th>Name</th><th>Role</th><th>Shop</th><th>Region</th><th>'+metricLabel+'</th></tr></thead><tbody>'+
    sorted.map(function(e){var on=!store[e.header.name];
      return '<tr style="'+(on?'':'opacity:.4;')+'"><td style="text-align:center"><input type="checkbox" class="xtoggle" data-tab="'+tab+'" data-emp="'+String(e.header.name).replace(/"/g,'&quot;')+'"'+(on?' checked':'')+' style="cursor:pointer;width:15px;height:15px"></td>'+
        '<td><span class="prow" data-emp="'+String(e.header.name).replace(/"/g,'&quot;')+'" style="cursor:pointer;color:var(--accent)">'+e.header.name+'</span></td>'+
        '<td>'+(e.header.position||'')+'</td><td style="font-size:11px">'+(e.header.shop||'')+'</td><td>'+(e.header.region||'')+'</td>'+
        '<td style="font-weight:600">'+fmtFn(e)+'</td></tr>';
    }).join('')+'</tbody></table></div></div>';
  return h;
}
function setAllIncl(tab,include){
  var store=tab==='salary'?EXCLUDED_SALARY:EXCLUDED_TENURE;
  var list=(tab==='salary')?employees.filter(function(e){return e.header.salary;}):employees.filter(function(e){return tenureOf(e)!=null;});
  list.forEach(function(e){if(include)delete store[e.header.name];else store[e.header.name]=true;});
  if(tab==='salary')renderSalary();else renderTenure();
}
document.addEventListener('change',function(ev){
  var t=ev.target;
  if(t&&t.classList&&t.classList.contains('xtoggle')){
    var tab=t.getAttribute('data-tab'),name=t.getAttribute('data-emp');
    var store=tab==='salary'?EXCLUDED_SALARY:EXCLUDED_TENURE;
    if(t.checked)delete store[name];else store[name]=true;
    if(tab==='salary')renderSalary();else renderTenure();
  }
});

function renderCompLocation(){
  var out='';
  var emps=employees;
// COMPENSATION vs LOCATION & PERFORMANCE
  out+='<div class="panel"><h2>Compensation vs. Location &amp; Performance</h2><div class="sub">Does pay track performance, or location? ('+roleNote().toLowerCase()+')</div>';
  var sal=ALL_EMP.filter(function(e){return e.header.salary&&(roleFilter==='ALL'||e.header.position===roleFilter)&&includedSalary(e);});
  var cPerf=_corr(sal.map(function(e){return e.header.salary;}),sal.map(pAvg));
  var cPot=_corr(sal.map(function(e){return e.header.salary;}),sal.map(qAvg));
  var byReg={};sal.forEach(function(e){(byReg[e.header.region]=byReg[e.header.region]||[]).push(e);});
  out+='<div style="font-size:13px;margin:8px 0 14px">Salary &harr; performance correlation: <strong style="color:'+(Math.abs(cPerf)<0.3?'var(--red)':'var(--green)')+'">'+(isNaN(cPerf)?'n/a':cPerf.toFixed(2))+'</strong> &nbsp;&middot;&nbsp; Salary &harr; potential correlation: <strong style="color:'+(Math.abs(cPot)<0.3?'var(--red)':'var(--green)')+'">'+(isNaN(cPot)?'n/a':cPot.toFixed(2))+'</strong>'+((Math.abs(cPerf)<0.3&&Math.abs(cPot)<0.3)?' &mdash; pay is weakly tied to both performance and potential.':'')+'</div>';
  out+='<table class="tbl"><thead><tr><th>Region</th><th>n (paid)</th><th>Avg Salary</th><th>Avg Performance</th><th>Avg Potential</th><th>Salary&harr;Perf (within region)</th><th>Salary&harr;Pot (within region)</th></tr></thead><tbody>';
  Object.keys(byReg).sort(function(a,b){return _mean(byReg[b].map(function(e){return e.header.salary;}))-_mean(byReg[a].map(function(e){return e.header.salary;}));}).forEach(function(rg){
    var g=byReg[rg];var c=_corr(g.map(function(e){return e.header.salary;}),g.map(pAvg));var cq=_corr(g.map(function(e){return e.header.salary;}),g.map(qAvg));
    out+='<tr><td><strong>'+rg+'</strong></td><td>'+g.length+'</td><td>$'+Math.round(_mean(g.map(function(e){return e.header.salary;}))).toLocaleString()+'</td><td>'+perfBadge(_mean(g.map(pAvg)))+'</td><td>'+perfBadge(_mean(g.map(qAvg)))+'</td><td>'+(isNaN(c)?'&mdash;':c.toFixed(2))+'</td><td>'+(isNaN(cq)?'&mdash;':cq.toFixed(2))+'</td></tr>';
  });
  out+='</tbody></table><div class="sub" style="margin-top:8px">Large gaps between regional average salaries that are <em>not</em> matched by performance gaps indicate pay is driven by local labor market, not output &mdash; useful when benchmarking comp equity across markets.</div></div>';

  
  /* ---- shop-level COL meta analysis ---- */
  var byShop={};
  ALL_EMP.forEach(function(e){var s=e.header.shop;if(!s)return;if(roleFilter!=='ALL'&&e.header.position!==roleFilter)return;if(!includedSalary(e))return;(byShop[s]=byShop[s]||[]).push(e);});
  var rows=Object.keys(byShop).map(function(s){
    var g=byShop[s].filter(function(e){return e.header.salary;});
    if(!g.length)return null;
    var avgS=_mean(g.map(function(e){return e.header.salary;}));
    var avgP=_mean(byShop[s].map(pAvg));
    var avgQ=_mean(byShop[s].map(qAvg));
    var avgO=(avgP+avgQ)/2;
    var c=shopCOL(s);
    var adj=c?avgS/c.col*100:null;
    return {shop:s,n:g.length,loc:c?c.loc:'?',col:c?c.col:null,basis:c?c.basis:'',avgS:avgS,adj:adj,avgP:avgP,avgQ:avgQ,avgO:avgO,valPerPt:adj?adj/avgO:null};
  }).filter(Boolean).sort(function(a,b){return (b.adj||0)-(a.adj||0);});
  out+='<div class="panel"><h2>Cost-of-Living Adjusted Compensation by Shop</h2>'+
    '<div class="sub">Each shop mapped to its market; salaries normalized to national purchasing power (BEA Regional Price Parity style, national = 100). COL values are documented estimates — hover the index for the basis; edit COL_MAP in source as better data arrives.</div>'+
    '<table class="tbl"><thead><tr><th>Shop</th><th>Location</th><th>COL Index</th><th>n</th><th>Avg Salary (nominal)</th><th>COL-Adjusted</th><th>Avg Performance</th><th>Avg Potential</th><th>Adj $ / Overall Pt</th></tr></thead><tbody>';
  rows.forEach(function(r){
    var prem=r.col?(r.col-100):0;
    var colBadge=r.col?('<span title="'+r.basis+'" style="font-weight:600;color:'+(prem>5?'var(--red)':prem<-5?'var(--green)':'var(--text)')+'">'+r.col+(prem>0?' (+'+prem+'%)':prem<0?' ('+prem+'%)':'')+'</span>'):'&mdash;';
    var delta=r.adj?Math.round(r.adj-r.avgS):0;
    out+='<tr><td><strong>'+r.shop+'</strong></td><td style="color:var(--muted)">'+r.loc+'</td><td>'+colBadge+'</td><td>'+r.n+'</td>'+
      '<td>$'+Math.round(r.avgS).toLocaleString()+'</td>'+
      '<td><strong>$'+(r.adj?Math.round(r.adj).toLocaleString():'&mdash;')+'</strong> <span style="font-size:10px;color:'+(delta<0?'var(--red)':'var(--green)')+'">'+(delta>0?'+':'')+delta.toLocaleString()+'</span></td>'+
      '<td>'+perfBadge(r.avgP)+'</td><td>'+perfBadge(r.avgQ)+'</td><td>'+(r.valPerPt?'$'+Math.round(r.valPerPt).toLocaleString():'&mdash;')+'</td></tr>';
  });
  out+='</tbody></table>'+
    '<div style="background:#eef6f9;border-left:3px solid var(--accent);padding:12px 16px;border-radius:8px;margin-top:12px;font-size:12.5px;line-height:1.7">'+
    '<strong>How to read this.</strong> A StayMarquis salary of approximately $100k on Long Island carries the national purchasing power of roughly $86k; a Rent Branson salary of ~$45k carries the purchasing power of approximately $52k nationally. The <em>COL-Adjusted</em> column is the apples-to-apples number for cross-market comp comparisons, and <em>Adj $/Overall Pt</em> shows what a point of evaluated capability (performance and potential combined) costs in real purchasing power — the cleanest "what do we get for the salary" metric across markets.</div></div>';
  return out;
}

/* ===================== COMPETENCIES TAB ===================== */
function renderCompetencies(){
  var el=document.getElementById('page-competencies');
  var emps=employees;
  var allItems=PITEMS.concat(NITEMS);
  // per-item stats
  var statRows=allItems.map(function(k){
    var v=itemVals(emps,k);var dist=[0,0,0,0];v.forEach(function(x){if(x>=1&&x<=4)dist[x-1]++;});
    return{k:k,grp:k[0]==='p'?'Performance':'Potential',mean:_mean(v),med:_median(v),std:_pstd(v),n:v.length,dist:dist};
  });
  var html='<div class="panel"><h2>Competencies — Item-Level Analysis</h2>'+
    '<div class="sub">'+roleNote()+' &nbsp;·&nbsp; 9 performance items, 9 potential items. '+
    'Named competencies from the Awayday ORM assessment.</div>';

  // KEY TAKEAWAYS (computed live)
  var perfStats=statRows.filter(function(r){return r.grp==='Performance';});
  var weakest=perfStats.slice().sort(function(a,b){return a.mean-b.mean;})[0];
  var mostVar=statRows.slice().sort(function(a,b){return b.std-a.std;})[0];
  // weakest region on weakest item
  var regions=Array.from(new Set(emps.map(function(e){return e.header.region;}))).filter(Boolean);
  var regWeak=null;
  regions.forEach(function(rg){var sub=emps.filter(function(e){return e.header.region===rg;});var v=itemVals(sub,weakest.k);if(v.length>=4){var m=_mean(v);if(!regWeak||m<regWeak.m)regWeak={rg:rg,m:m,n:v.length};}});
  var ppOverall=_corr(emps.map(pAvg),emps.map(qAvg));
  html+='<div style="background:#eef6f9;border-left:3px solid var(--accent);padding:14px 16px;border-radius:8px;margin:14px 0;font-size:13px;line-height:1.7">'+
    '<strong>Key takeaways (live, '+roleNote().toLowerCase()+')</strong><br>'+
    '&bull; Lowest-scoring competency: <strong>'+clab(weakest.k)+'</strong> (mean '+weakest.mean.toFixed(2)+') &mdash; the team-wide soft spot.<br>'+
    '&bull; Most inconsistent competency: <strong>'+clab(mostVar.k)+'</strong> (std '+mostVar.std.toFixed(2)+') &mdash; widest spread, suggests uneven capability or evaluation.<br>'+
    (regWeak?('&bull; Region of concern: <strong>'+regWeak.rg+'</strong> scores lowest on '+clab(weakest.k)+' (mean '+regWeak.m.toFixed(2)+', n='+regWeak.n+').<br>'):'')+
    '&bull; Performance&harr;Potential correlation: <strong>'+(isNaN(ppOverall)?'n/a':ppOverall.toFixed(2))+'</strong> for this group.'+
    '</div>';

  // STAT TABLE with distribution mini-bars
  html+='<table class="tbl"><thead><tr><th>Competency</th><th>Group</th><th>Mean</th><th>Median</th><th>Std Dev</th><th>n</th><th>Distribution (1&rarr;4)</th></tr></thead><tbody>';
  statRows.forEach(function(r){
    var tot=r.dist.reduce(function(s,x){return s+x;},0)||1;
    var dcols=['#d0021b','#F9972B','#D6AD0D','#00875a'];
    var bar='<div style="display:flex;height:16px;width:160px;border-radius:3px;overflow:hidden;border:1px solid var(--border)">'+
      r.dist.map(function(c,i){return c?'<div title="'+(i+1)+': '+c+'" style="background:'+dcols[i]+';width:'+(100*c/tot)+'%"></div>':'';}).join('')+'</div>';
    html+='<tr><td title="'+(COMP_DEFS[r.k]||'')+'"><strong>'+clab(r.k)+'</strong></td><td style="color:var(--muted)">'+r.grp+'</td>'+
      '<td style="color:'+scoreColor(r.mean)+';font-weight:600">'+r.mean.toFixed(2)+'</td>'+
      '<td>'+r.med.toFixed(1)+'</td><td>'+r.std.toFixed(2)+'</td><td style="color:var(--muted)">'+r.n+'</td><td>'+bar+'</td></tr>';
  });
  html+='</tbody></table></div>';

  // CORRELATION HEATMAP (performance items)
  html+='<div class="panel"><h2>Competency Correlation Matrix</h2><div class="sub">Pairwise correlation among performance items ('+roleNote().toLowerCase()+'). Teal = positive, red = negative.</div>';
  html+=corrMatrixHTML(emps,PITEMS);
  html+='<div class="sub" style="margin-top:16px">Potential items</div>'+corrMatrixHTML(emps,NITEMS)+'</div>';

  // PERF vs POT correlation by role
  html+='<div class="panel"><h2>Performance &harr; Potential Correlation by Role</h2><div class="sub">How tightly the two axes move together within each role.</div><table class="tbl"><thead><tr><th>Role</th><th>n</th><th>Corr (perf vs pot)</th><th>Avg Perf</th><th>Avg Pot</th></tr></thead><tbody>';
  ['ALL','LORM','ORM','ORR'].forEach(function(r){
    var sub=(r==='ALL')?ALL_EMP:ALL_EMP.filter(function(e){return (e.header.position||'')===r;});
    if(!sub.length)return;
    var c=_corr(sub.map(pAvg),sub.map(qAvg));
    html+='<tr><td><strong>'+r+'</strong></td><td>'+sub.length+'</td><td style="font-weight:600">'+(isNaN(c)?'n/a':c.toFixed(3))+'</td><td>'+_mean(sub.map(pAvg)).toFixed(2)+'</td><td>'+_mean(sub.map(qAvg)).toFixed(2)+'</td></tr>';
  });
  html+='</tbody></table><div class="sub" style="margin-top:8px">A high correlation means evaluators rate performance and potential in lockstep; a low one (often seen for LORMs) means the two are being judged more independently.</div></div>';

  // REGION SEGMENTATION: item means by region, weakest cell highlighted
  html+='<div class="panel"><h2>Competency by Region</h2><div class="sub">Mean score per performance item by region ('+roleNote().toLowerCase()+'). Red-tinted cells = weakest region for that item (regions with n&ge;3).</div>';
  html+='<div class="sub" style="margin-top:4px;font-weight:600">Performance competencies</div>'+regionMatrixHTML(emps,PITEMS)+'<div class="sub" style="margin-top:14px;font-weight:600">Potential competencies</div>'+regionMatrixHTML(emps,NITEMS);
  html+='</div>';

  el.innerHTML=html;
}
function corrMatrixHTML(emps,items){
  var h='<div style="overflow-x:auto"><table style="border-collapse:collapse;font-size:11px"><tr><td></td>';
  items.forEach(function(k){h+='<td style="padding:4px 6px;font-weight:600;color:var(--muted);text-align:center" title="'+clab(k)+'">'+cshort(k)+'</td>';});
  h+='</tr>';
  items.forEach(function(a){
    h+='<tr><td style="padding:4px 6px;font-weight:600;color:var(--muted);white-space:nowrap" title="'+clab(a)+'">'+cshort(a)+'</td>';
    items.forEach(function(b){
      var pv=pairVals(emps,a,b);var c=_corr(pv[0],pv[1]);
      h+='<td style="padding:6px 8px;text-align:center;background:'+corrColor(c)+';color:'+(Math.abs(c)>0.5?'#fff':'var(--text)')+';border:1px solid #fff">'+(isNaN(c)?'&mdash;':c.toFixed(2))+'</td>';
    });
    h+='</tr>';
  });
  return h+'</table></div>';
}
function regionMatrixHTML(emps,ITEMS){
  var regions=Array.from(new Set(emps.map(function(e){return e.header.region;}))).filter(Boolean).sort();
  // weakest region per item
  var weakBy={};
  ITEMS.forEach(function(k){var best=null;regions.forEach(function(rg){var v=itemVals(emps.filter(function(e){return e.header.region===rg;}),k);if(v.length>=3){var m=_mean(v);if(!best||m<best.m)best={rg:rg,m:m};}});weakBy[k]=best?best.rg:null;});
  var h='<div style="overflow-x:auto"><table style="border-collapse:collapse;font-size:11px"><tr><td style="padding:4px 6px;font-weight:600;color:var(--muted)">Region</td>';
  ITEMS.forEach(function(k){h+='<td style="padding:4px 6px;font-weight:600;color:var(--muted);text-align:center" title="'+clab(k)+'">'+cshort(k)+'</td>';});
  h+='<td style="padding:4px 6px;font-weight:600;color:var(--muted);text-align:center">n</td></tr>';
  regions.forEach(function(rg){
    var sub=emps.filter(function(e){return e.header.region===rg;});
    h+='<tr><td style="padding:4px 6px;font-weight:600;white-space:nowrap">'+rg+'</td>';
    ITEMS.forEach(function(k){var v=itemVals(sub,k);var m=v.length?_mean(v):null;var weak=(weakBy[k]===rg);h+='<td style="padding:5px 7px;text-align:center;'+(weak?'background:rgba(208,2,27,.16);font-weight:700;':'')+'color:'+(m!=null?scoreColor(m):'var(--muted)')+'">'+(m!=null?m.toFixed(2):'&mdash;')+'</td>';});
    h+='<td style="padding:4px 6px;text-align:center;color:var(--muted)">'+sub.length+'</td></tr>';
  });
  return h+'</table></div>';
}

function ensureModal(){
  if(document.getElementById('prof-modal'))return;
  var d=document.createElement('div');d.id='prof-modal';
  d.style.cssText='display:none;position:fixed;inset:0;background:rgba(0,30,45,.55);z-index:1000;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 16px';
  d.innerHTML='<div id="prof-card" style="background:#fff;max-width:780px;width:100%;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.3);padding:0;font-family:var(--font)"></div>';
  d.addEventListener('click',function(e){if(e.target===d)closeProfile();});
  document.body.appendChild(d);
}

function itemBars(e,items){

var TAG_COLORS={"ACCELERATE":"#00875a","FAST-TRACK":"#2e9e6b","DEVELOP & STRETCH":"#4a9aa8","DEVELOP":"#D6AD0D","ONBOARD / TRAIN":"#F9972B","STRUCTURED COACHING":"#e0701f","REPOSITION":"#7a5fb5","GAP or RESTRUCTURE":"#d0021b"};
var COMM_SECTIONS=[{"title": "High Performers & Stars", "cells": "9·Star · 8·Future Star · 6·High Core   ·   Accelerate / Fast-Track / Develop & Stretch", "why": ["Your top and emerging performers are the engine of owner retention at your brand. They are the ones owners call when something goes wrong, the ones who absorb the hardest conversations, and the ones other ORMs watch to understand what 'great' looks like. Recognizing them — formally, personally, and specifically — is not optional. It is how you keep them.", "The Awayday interview synthesis found that even the highest-performing ORMs carry invisible weight: the emotional labor of absorbing blame, the pressure of a growing portfolio, and the concern that growth is outpacing support. Your conversation should honor that reality directly."], "avoid": ["Vague praise — 'You're doing great' without specifics loses credibility with high performers", "Combining recognition with an unexpected concern — keep this conversation purely developmental", "Promising a promotion or title without HR alignment — frame it as a path, not a commitment", "Underestimating the workload conversation — Pam Shull's insight is real: portfolio growth is a retention risk"], "extra": ["**Owner Impact Framing**", "If asked why this conversation is happening now, be ready to be direct: Awayday's standard for owner retention is 93-95%. Your top ORMs are the primary reason those numbers hold. Losing a Star ORM typically means 60-120 owner relationships need to be re-established — a risk no brand can absorb quietly."]}, {"title": "Core Performers & Developing ORMs", "cells": "5·Core Contributor · 4·Developing   ·   Develop / Onboard & Train", "why": ["Core Performers are Awayday's largest ORM tier — 29 people. Developing ORMs number 10. Together, these 39 ORMs represent nearly half the team, and the consistency of their owner experience is directly tied to how well they are coached, not just hired. Many performance gaps in this tier exist because the system didn't support them well — insufficient onboarding, no financial acumen training, unclear expectations.", "The Ann Hester interview insight is instructive here: 'Anyone who doesn't bring a notebook doesn't last.' New ORMs are often blindsided by the depth of what this role demands. Your conversation at this tier should close that gap — and make clear that you are investing in them, not managing them out."], "avoid": ["Framing gaps as character flaws — nearly every Core and Developing ORM gap is a system or training issue", "Vague feedback — 'communicate better' without specific, observable behaviors is not actionable", "Delivering this conversation without a concrete 30-90 day plan ready — the plan makes the intention real", "Comparing them to other ORMs by name — focus on their performance relative to the role standard, not peers"], "extra": ["**The Onboarding Accountability Framing**", "If an ORM is in the Developing tier, be willing to say plainly: 'Part of this is on us.' Awayday's own interview synthesis confirms that onboarding inconsistency and volume pressure are structural — not individual — failures. Taking accountability for that sets the right tone for the recovery plan."]}, {"title": "Needs Support", "cells": "2·Underperformer   ·   Structured Coaching", "why": ["An ORM in the Structured Coaching tier has persistent performance gaps that have not resolved through routine management. These are not new hires still ramping — these are ORMs who should be further along. Owner churn is likely happening in their portfolios right now, even if it hasn't surfaced as a formal complaint yet.", "This conversation is the bridge between informal coaching and a formal Growth & Accountability Plan. It must be warm but clear. Supportive but honest. The ORM needs to leave this conversation understanding that the expectation is changing — and that real support is being put in place to help them meet it."], "avoid": ["Softening the message to the point where the ORM doesn't understand the seriousness of their situation", "Delivering this without a written coaching plan ready — verbal-only conversations are not enough at this tier", "Making promises about outcomes you can't guarantee ('You'll definitely get back on track')", "Involving other team members in the conversation — this must be private, one-on-one, and documented"], "extra": ["**Structure for a Structured Coaching Conversation**", "**Owner Impact Statement**", "Every ORM in this tier carries an active owner portfolio. The LORM should audit those owner books alongside this coaching conversation — because owner churn risk doesn't wait for the coaching cycle to complete. Be prepared to name specific portfolio concerns if the ORM asks why this conversation is happening now."]}, {"title": "Reposition — Hidden Gem", "cells": "7·Rough Diamond   ·   Reposition", "why": ["A Reposition ORM has high potential with low current performance — the clearest signal that role fit, not capability, is the issue. Jarett Bousquet (ORR, Meredith Lodging) holds the highest potential score below the Core Performer line on the entire team. Treating this conversation like a performance correction is the wrong frame entirely.", "This is a discovery conversation. Your goal is to understand what is not working in the current role, and to explore — openly and without pressure — whether a different assignment, level, or track would unlock what the data says is there."], "avoid": ["Framing this as a performance warning — it is not; the potential score protects against that framing", "Moving immediately to restructure — always test a stretch assignment first", "Letting this conversation happen only once — schedule a follow-up within 30 days to confirm next steps"], "extra": []}, {"title": "Growth & Accountability Plan (GAP)", "cells": "1·At Risk   ·   GAP or Restructure   ·   21 ORMs", "why": [], "avoid": ["Issuing a GAP without HR alignment — every GAP must be HR-reviewed before it is delivered", "Using 'we' language to soften individual accountability — the ORM needs to understand their personal responsibility", "Changing milestones mid-cycle without documentation — this undermines the plan's integrity", "Skipping the 30 or 60-day checkpoints — documented touchpoints are what protect the brand legally", "Having the separation conversation without HR present — always involve HR for Outcome D", "Sharing an ORM's GAP status with peers or other team members — confidentiality is non-negotiable"], "extra": ["**Understanding the GAP Tier**", "Twenty-one ORMs across Awayday carry the 1·At Risk designation. This is not a reflection of character — it is a reflection of a combination of factors: in some cases, persistent behavioral gaps; in others, role misfit; in others, a system that didn't catch the problem early enough. Before initiating a GAP, every Brand President must first answer one question:", "**The GAP Conversation — Opening Language**", "**GAP Step-by-Step Process Guide**", "Follow this sequence precisely. Deviating from the process — particularly on documentation — creates risk for the brand and for the ORM.", "**The 90-Day Closing Conversation — Language by Outcome**", "**Guiding Principles for Every ORM Conversation**", "Confidential  ·  For Brand President Use Only  ·  Awayday ORM Excellence Initiative  ·  2026"]}];
function tagBadge(t){var c=TAG_COLORS[t]||'#5a8fa3';return '<span style="background:'+c+'1a;color:'+c+';border:1px solid '+c+'55;padding:2px 9px;border-radius:11px;font-size:11px;font-weight:700;white-space:nowrap">'+t+'</span>';}

function linkifyNames(text){

  names.forEach(function(n){ if(text.indexOf(n)>=0){ text=text.split(n).join(nameLink(n)); } });
  return text;
}

   Tenure tab, and CI trait-relationship analysis.

var CI_BY_NAME={};(function(){if(typeof CI_TRAITS!=='undefined')CI_TRAITS.forEach(function(c){CI_BY_NAME[c.name]=c;});})();
function starCell(e){return cell9(pAvg(e),qAvg(e));}
function isStar(e){return starCell(e)>=8;}

/* ---------- WHAT GREAT LOOKS LIKE (returns HTML, injected into Competencies) ---------- */
function whatGreatHTML(){
  var emps=employees;
  var stars=emps.filter(isStar), rest=emps.filter(function(e){return !isStar(e);});
  if(stars.length<3||rest.length<3) return '<div class="panel"><h2>What Great Looks Like</h2><div class="sub">Not enough Stars in the current role filter to compute a reliable fingerprint. Switch the role filter to All.</div></div>';
  var items=PITEMS.concat(NITEMS);
  var fp=items.map(function(k){var s=_mean(itemVals(stars,k)),r=_mean(itemVals(rest,k));return{k:k,s:s,r:r,gap:s-r};}).sort(function(a,b){return b.gap-a.gap;});
  // potential prediction
  var pred=NITEMS.map(function(k){return{k:k,c:_corr(emps.map(function(e){return e.responses[k];}),emps.map(pAvg)),cq:_corr(emps.map(function(e){return e.responses[k];}),emps.map(qAvg))};}).sort(function(a,b){return b.c-a.c;});

  var html='<div class="panel"><h2>What Great Looks Like</h2><div class="sub">'+roleNote()+' &nbsp;·&nbsp; '+stars.length+' Stars (9-box 8&ndash;9) vs. '+rest.length+' others. The gap between Star and non-Star average is the hiring signal: big gap = screen for it, small gap = trainable.</div>';
  // fingerprint bars (diverging by gap size)
  var maxGap=Math.max.apply(null,fp.map(function(x){return x.gap;}));
  html+='<div style="margin-top:12px">';
  fp.forEach(function(x){
    var w=Math.max(2,x.gap/maxGap*100);
    var big=x.gap>=0.9;
    html+='<div style="display:flex;align-items:center;gap:10px;margin:5px 0;font-size:12px">'+
      '<div style="width:210px;color:var(--text)" title="'+(COMP_DEFS[x.k]||'')+'">'+clab(x.k)+(x.k[0]==='n'?' <span style=\"color:var(--muted);font-size:10px\">(pot)</span>':'')+'</div>'+
      '<div style="flex:1;background:#eef3f6;border-radius:4px;height:16px;overflow:hidden"><div style="width:'+w+'%;height:100%;background:'+(big?'var(--accent)':'#9bc4d1')+'"></div></div>'+
      '<div style="width:96px;text-align:right;font-size:11px"><span style="color:var(--green);font-weight:600">'+x.s.toFixed(2)+'</span> vs '+x.r.toFixed(2)+' <strong style="color:'+(big?'var(--accent)':'var(--muted)')+'">+'+x.gap.toFixed(2)+'</strong></div></div>';
  });
  html+='</div>';
  // narrative
  var top3=fp.slice(0,3).map(function(x){return clab(x.k);});
  var bottom=fp[fp.length-1];
  html+='<div style="background:#eef6f9;border-left:3px solid var(--accent);padding:14px 16px;border-radius:8px;margin-top:14px;font-size:13px;line-height:1.7">'+
    '<strong>Read.</strong> The widest Star/non-Star separations are <strong>'+top3.join(', ')+'</strong> &mdash; these are the competencies to screen hardest for in market, because non-Stars don\'t close the gap on their own. '+
    'The narrowest gap is <strong>'+clab(bottom.k)+'</strong> (+'+bottom.gap.toFixed(2)+'), meaning near-everyone is comparable there &mdash; it\'s table-stakes, not a differentiator.</div></div>';

  // potential-item prediction
  html+='<div class="panel"><h2>Which Potential Traits Predict Performance</h2><div class="sub">Correlation of each potential (disposition) item with actual performance average. The strongest are your best pre-hire interview signals &mdash; they describe disposition you can observe before someone is in the role.</div><table class="tbl"><thead><tr><th>Potential Competency</th><th>Corr with Performance</th><th>Corr with Potential (composite)</th><th>Strength (vs. performance)</th></tr></thead><tbody>';
  pred.forEach(function(x){var bar=Math.max(2,Math.abs(x.c)*100);html+='<tr class="prow-none"><td title="'+(COMP_DEFS[x.k]||'')+'"><strong>'+clab(x.k)+'</strong></td><td style="font-weight:600;color:var(--accent)">'+x.c.toFixed(3)+'</td><td style="font-weight:600;color:var(--muted)">'+x.cq.toFixed(3)+'</td><td><div style="background:#eef3f6;border-radius:4px;height:14px;width:200px;overflow:hidden"><div style="width:'+bar+'%;height:100%;background:var(--accent)"></div></div></td></tr>';});
  html+='</tbody></table><div class="sub" style="margin-top:8px">Weight your interview rubric toward the top items: they convert into results. Bottom items matter less for selection and more for team fit.</div></div>';
  return html;
}

    });
    s+='<div style="position:absolute;bottom:-18px;left:0;font-size:10px;color:var(--muted)">0 yrs</div><div style="position:absolute;bottom:-18px;right:0;font-size:10px;color:var(--muted)">'+maxT.toFixed(1)+' yrs</div><div style="position:absolute;top:-2px;left:-4px;font-size:10px;color:var(--muted);transform:translateX(-100%)">4.0</div><div style="position:absolute;bottom:-2px;left:-4px;font-size:10px;color:var(--muted);transform:translateX(-100%)">1.0</div></div></div>';
    return s;
  }
  html+=scatter('Tenure vs. Performance',pAvg);
  html+=scatter('Tenure vs. Potential',qAvg);
  html+='<div class="panel"><div class="sub" style="margin-top:0">A flat distribution (low correlation on either axis) indicates tenure alone does not raise capability &mdash; strong hires tend to perform from the outset. A rising slope would indicate a meaningful learning curve worth protecting new hires through. Note that those who left are not represented, so survivorship should be weighed before drawing conclusions.</div></div>';

  el.innerHTML=inclP+html;
}

/* ===================== CI TRAIT-RELATIONSHIP (injected into Culture Index tab) ===================== */
var TRAITS=[['A','A (rel)'],['B','B (rel)'],['C','C (rel)'],['D','D (rel)'],['L','L (abs)'],['I','I (abs)']];
var TRAIT_DESC={A:'Autonomy / drive (vs. red line)',B:'Social / extroversion (vs. red line)',C:'Pace / patience (vs. red line)',D:'Conformity / structure (vs. red line)',L:'Logic / reasoning (absolute)',I:'Ingenuity / detail tolerance (absolute)'};
function fmtRange(lo,hi){return (lo>=0?'+':'')+lo.toFixed(1)+' to '+(hi>=0?'+':'')+hi.toFixed(1);}
function ciTraitHTML(){
  var emps=employees.filter(function(e){return CI_BY_NAME[e.header.name];});
  if(emps.length<5)return '';
  var rec=emps.map(function(e){return{c:CI_BY_NAME[e.header.name],p:pAvg(e),q:qAvg(e),o:(pAvg(e)+qAvg(e))/2,cell:starCell(e),e:e};});
  var stars=rec.filter(function(r){return r.cell>=8;}), rest=rec.filter(function(r){return r.cell<8;});

  var html='<div class="panel"><h2>CI Traits &times; Performance, Potential &amp; 9-Box</h2><div class="sub">'+roleNote()+' &nbsp;\u00b7&nbsp; n='+emps.length+' matched to CI records. Focus on the self-profile traits <strong>A\u2013D</strong> (signed relative to the red line); L and I are absolute reasoning traits. Job-behavior traits are excluded by design. Each correlation shows how the trait moves with the outcome across the matched roster.</div>';

  // MAIN TABLE: A-D, L, I vs perf / pot / 9-box
  html+='<table class="tbl"><thead><tr><th>Trait</th><th>Meaning</th><th>Corr w/ Performance</th><th>Corr w/ Potential</th><th>Corr w/ 9-Box Cell</th><th>Star avg</th><th>Non-Star avg</th><th>Gap</th></tr></thead><tbody>';
  var stat={};
  TRAITS.forEach(function(t){
    var key=t[0];
    var cp=_corr(rec.map(function(r){return r.c[key];}),rec.map(function(r){return r.p;}));
    var cq=_corr(rec.map(function(r){return r.c[key];}),rec.map(function(r){return r.q;}));
    var cc=_corr(rec.map(function(r){return r.c[key];}),rec.map(function(r){return r.cell;}));
    var sa=_mean(stars.map(function(r){return r.c[key];})), ra=_mean(rest.map(function(r){return r.c[key];}));
    var gap=sa-ra; stat[key]={cp:cp,cq:cq,cc:cc,sa:sa,ra:ra,gap:gap};
    var big=Math.abs(gap)>=0.3 && (key!=='L'&&key!=='I'?true:Math.abs(gap)>=0.3);
    var isAD=(key==='A'||key==='B'||key==='C'||key==='D');
    html+='<tr'+(isAD?' style="background:#f7fbfc"':'')+'><td><strong>'+t[1]+'</strong></td><td style="font-size:11px;color:var(--muted)">'+TRAIT_DESC[key]+'</td>'+
      '<td style="color:'+corrTxt(cp)+';font-weight:600">'+cp.toFixed(2)+'</td>'+
      '<td style="color:'+corrTxt(cq)+';font-weight:600">'+cq.toFixed(2)+'</td>'+
      '<td style="color:'+corrTxt(cc)+';font-weight:600">'+cc.toFixed(2)+'</td>'+
      '<td>'+sa.toFixed(2)+'</td><td>'+ra.toFixed(2)+'</td>'+
      '<td style="font-weight:'+(big?'700':'400')+';color:'+(big?'var(--accent)':'var(--muted)')+'">'+(gap>=0?'+':'')+gap.toFixed(2)+'</td></tr>';
  });
  html+='</tbody></table>';
  // narrative driven by the data
  var adRanked=['A','B','C','D'].map(function(k){return{k:k,cc:stat[k].cc,gap:stat[k].gap};}).sort(function(a,b){return Math.abs(b.cc)-Math.abs(a.cc);});
  var top=adRanked[0];
  html+='<div style="background:#eef6f9;border-left:3px solid var(--accent);padding:14px 16px;border-radius:8px;margin-top:14px;font-size:12.5px;line-height:1.7">'+
    '<strong>Reading the A\u2013D signal.</strong> Of the four self-profile traits, <strong>D ('+TRAIT_DESC.D.replace(' (vs. red line)','')+')</strong> carries the strongest and most consistent positive relationship &mdash; it correlates with performance ('+stat.D.cp.toFixed(2)+'), potential ('+stat.D.cq.toFixed(2)+'), and 9-box placement ('+stat.D.cc.toFixed(2)+'), and Stars average '+stat.D.sa.toFixed(2)+' versus '+stat.D.ra.toFixed(2)+' for everyone else. '+
    '<strong>I (Ingenuity/detail)</strong> runs the other way (performance '+stat.I.cp.toFixed(2)+', potential '+stat.I.cq.toFixed(2)+'), suggesting the strongest people index toward structure and follow-through over open-ended ideation. A, B, and C show weak, near-zero relationships on their own. '+
    'These are modest single-trait effects on a matched sample of '+emps.length+', so the combination below matters more than any one letter.</div>';
  html+='</div>';

  // ===== IDEAL CI PROFILE =====
  html+='<div class="panel"><h2>Toward an "Ideal" CI Profile</h2><div class="sub">Trait centroid of the strongest employees, built two ways: the Star cohort (9-box 8\u20139) and the top overall quartile. The band is mean \u00b1 1 SD &mdash; a target range, not a single point.</div>';
  function profile(group){
    return TRAITS.map(function(t){var vals=group.map(function(r){return r.c[t[0]];}).filter(function(v){return v!=null;});return{k:t[0],m:_mean(vals),sd:_pstd(vals)};});
  }
  var ovSorted=rec.slice().sort(function(a,b){return b.o-a.o;});
  var topq=ovSorted.slice(0,Math.max(3,Math.round(rec.length/4)));
  var pStar=profile(stars), pTop=profile(topq);
  html+='<table class="tbl"><thead><tr><th>Trait</th><th>Star cohort (n='+stars.length+')</th><th>Top quartile (n='+topq.length+')</th><th>Target band (Star \u00b1 1 SD)</th><th>Direction</th></tr></thead><tbody>';
  pStar.forEach(function(s,i){
    var t=pTop[i];var isAD=(s.k==='A'||s.k==='B'||s.k==='C'||s.k==='D');
    var dir=Math.abs(stat[s.k].cc)<0.12?'<span style="color:var(--muted)">neutral</span>':(stat[s.k].cc>0?'<span style="color:var(--green)">higher is better</span>':'<span style="color:var(--red)">lower is better</span>');
    html+='<tr'+(isAD?' style="background:#f7fbfc"':'')+'><td><strong>'+s.k+'</strong> <span style="font-size:10px;color:var(--muted)">'+TRAIT_DESC[s.k].replace(' (vs. red line)','').replace(' (absolute)','')+'</span></td>'+
      '<td style="font-weight:600">'+(s.m>=0?'+':'')+s.m.toFixed(2)+'</td>'+
      '<td>'+(t.m>=0?'+':'')+t.m.toFixed(2)+'</td>'+
      '<td style="font-weight:600;color:var(--accent)">'+fmtRange(s.m-s.sd,s.m+s.sd)+'</td>'+
      '<td style="font-size:11px">'+dir+'</td></tr>';
  });
  html+='</tbody></table>';
  // visual: A-D bar relative to red line (0)
  html+='<div style="margin-top:14px"><div class="sub" style="font-weight:600">Star centroid on the A\u2013D axes (0 = red line)</div>';
  ['A','B','C','D'].forEach(function(k){
    var s=pStar.find(function(x){return x.k===k;});var v=s.m;var pct=Math.min(48,Math.abs(v)/3*48);
    html+='<div style="display:flex;align-items:center;gap:10px;margin:6px 0;font-size:12px">'+
      '<div style="width:150px;color:var(--text)">'+k+' \u00b7 '+TRAIT_DESC[k].replace(' (vs. red line)','')+'</div>'+
      '<div style="flex:1;position:relative;height:18px;background:#eef3f6;border-radius:4px">'+
        '<div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--muted)"></div>'+
        '<div style="position:absolute;'+(v>=0?'left:50%':'right:50%')+';top:2px;bottom:2px;width:'+pct+'%;background:'+(v>=0?'var(--accent)':'var(--orange)')+';border-radius:3px"></div>'+
      '</div>'+
      '<div style="width:48px;text-align:right;font-weight:600;color:'+(v>=0?'var(--accent)':'var(--orange)')+'">'+(v>=0?'+':'')+v.toFixed(2)+'</div></div>';
  });
  html+='</div>';
  html+='<div style="background:#fff7e6;border-left:3px solid var(--orange);padding:14px 16px;border-radius:8px;margin-top:14px;font-size:12.5px;line-height:1.7">'+
    '<strong>How to use this.</strong> The clearest recruitable signal is <strong>D above the red line</strong> (structure, conscientiousness, follow-through) paired with <strong>moderate I</strong> rather than very high ingenuity. A, B, and C are close to the red line for top performers, meaning they are not strong screens on their own. Treat the target band as a directional filter to widen or narrow a candidate pool, not a pass/fail gate &mdash; n is '+stars.length+' for the Star centroid, and CI is one input alongside the competency fingerprint in the Competencies tab. The two together (D-forward CI profile + high Owner-Obsessed/Initiative/Trust on the assessment) is a stronger "what great looks like" definition than either alone.</div>';
  html+='</div>';

  // trait inter-correlation matrix (A-D, L, I only)
  html+='<div class="panel"><h2>Trait Inter-Correlations</h2><div class="sub">How the self-profile traits move together across the matched roster. Teal = positive, red = negative.</div><div style="overflow-x:auto"><table style="border-collapse:collapse;font-size:11px"><tr><td></td>';
  TRAITS.forEach(function(t){html+='<td style="padding:4px 6px;font-weight:600;color:var(--muted);text-align:center">'+t[0]+'</td>';});
  html+='</tr>';
  TRAITS.forEach(function(ta){html+='<tr><td style="padding:4px 6px;font-weight:600;color:var(--muted)">'+ta[0]+'</td>';
    TRAITS.forEach(function(tb){var c=_corr(rec.map(function(r){return r.c[ta[0]];}),rec.map(function(r){return r.c[tb[0]];}));
      html+='<td style="padding:6px 8px;text-align:center;background:'+corrColor(c)+';color:'+(Math.abs(c)>0.5?'#fff':'var(--text)')+';border:1px solid #fff">'+(isNaN(c)?'\u2014':c.toFixed(2))+'</td>';});
    html+='</tr>';});
  html+='</table></div></div>';

  // pattern x star rate
  var byPat={};rec.forEach(function(r){(byPat[r.c.pattern]=byPat[r.c.pattern]||[]).push(r);});
  html+='<div class="panel"><h2>CI Pattern &times; Star Rate</h2><div class="sub">Which Culture Index patterns over-index among Stars (patterns with n&ge;3).</div><table class="tbl"><thead><tr><th>Pattern</th><th>n</th><th>% Stars</th><th>Avg Performance</th><th>Avg Potential</th><th>Avg D (rel)</th><th>Avg EU \u0394</th></tr></thead><tbody>';
  Object.keys(byPat).filter(function(p){return byPat[p].length>=3;}).sort(function(a,b){return byPat[b].filter(function(r){return r.cell>=8;}).length/byPat[b].length - byPat[a].filter(function(r){return r.cell>=8;}).length/byPat[a].length;}).forEach(function(p){
    var g=byPat[p];var sr=100*g.filter(function(r){return r.cell>=8;}).length/g.length;
    html+='<tr><td><strong>'+p+'</strong></td><td>'+g.length+'</td><td style="font-weight:600;color:'+(sr>=30?'var(--green)':'var(--text)')+'">'+Math.round(sr)+'%</td><td>'+perfBadge(_mean(g.map(function(r){return r.p;})))+'</td><td>'+perfBadge(_mean(g.map(function(r){return r.q;})))+'</td><td>'+(_mean(g.map(function(r){return r.c.D;}))>=0?'+':'')+_mean(g.map(function(r){return r.c.D;})).toFixed(2)+'</td><td>'+_mean(g.map(function(r){return r.c.eu_d;})).toFixed(1)+'</td></tr>';
  });
  html+='</tbody></table><div class="sub" style="margin-top:8px">Coordinator over-indexes among Stars, consistent with the conscientious-caregiver archetype and the D-forward signal above. Per-pattern n is small, so treat as directional.</div></div>';
  return html;
}
function corrTxt(c){if(isNaN(c))return 'var(--muted)';if(Math.abs(c)<0.15)return 'var(--muted)';return c>0?'var(--green)':'var(--red)';}

/* ---------- inject What-Great into Competencies & CI-traits into Culture Index ---------- */
(function(){
  var _comp=renderCompetencies;
  renderCompetencies=function(){_comp();var el=document.getElementById('page-competencies');el.innerHTML+=whatGreatHTML();};
  var _ci=renderCI;
  renderCI=function(){_ci();var slot=document.getElementById('ci-traits-slot');if(slot)slot.innerHTML=ciTraitHTML();};
})();

</script>
</body>
