<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AwayDay ORM Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--bg:#0f1117;--surface:#181b23;--surface2:#1e2230;--border:#2a2f42;--text:#e8eaf2;--muted:#7b82a0;--accent:#4f8ef7;--green:#3ecf8e;--red:#f05252;--yellow:#f5a623;--orange:#ff7b39;--font:'DM Sans',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap');
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:700;color:var(--text);padding:16px 20px 16px 0;border-right:1px solid var(--border);margin-right:8px;white-space:nowrap}
.logo span{color:var(--accent)}
.navtabs{display:flex;gap:2px;flex:1;overflow-x:auto;padding:8px 0}
.navtabs::-webkit-scrollbar{display:none}
.ntab{background:transparent;border:none;color:var(--muted);padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12.5px;font-weight:500;font-family:var(--font);white-space:nowrap;transition:all .15s}
.ntab:hover{background:var(--surface2);color:var(--text)}
.ntab.active{background:var(--accent);color:#fff}
.emp-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--muted);margin-left:auto;white-space:nowrap}
.page{display:none;padding:20px 24px;max-width:1400px;margin:0 auto}
.page.active{display:block}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:16px}
.panel h2{font-size:14px;font-weight:600;margin-bottom:4px}
.panel .sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.chart-wrap{position:relative;height:220px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:800px){.two-col{grid-template-columns:1fr}}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.stat .label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat .val{font-size:24px;font-weight:700}
.stat .val.green{color:var(--green)}.stat .val.yellow{color:var(--yellow)}.stat .val.red{color:var(--red)}.stat .val.blue{color:var(--accent)}
.ninebox{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;min-width:560px}
.nb-cell{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;min-height:80px}
.nb-cell-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.nb-dots{display:flex;flex-wrap:wrap;gap:3px}
.nb-dot{width:8px;height:8px;border-radius:50%;cursor:pointer;position:relative;transition:transform .15s;flex-shrink:0}
.nb-dot:hover{transform:scale(2.2);z-index:20}
.nb-dot[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:#1a1f2e;border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--text);white-space:nowrap;z-index:100;pointer-events:none}
.cell-color-9{background:#1a3a2a}.cell-color-8{background:#1e2e3a}.cell-color-7{background:#2a2a1a}
.cell-color-6{background:#1a2a2a}.cell-color-5{background:#1e2230}.cell-color-4{background:#2a1e1e}
.cell-color-3{background:#1e1e2a}.cell-color-2{background:#2a221e}.cell-color-1{background:#2a1a1a}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--border)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--surface2)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.badge-green{background:#1a3a2a;color:var(--green)}.badge-yellow{background:#2a2010;color:var(--yellow)}
.badge-red{background:#2a1010;color:var(--red)}.badge-blue{background:#1a2040;color:var(--accent)}
.badge-orange{background:#2a1a10;color:var(--orange)}.badge-purple{background:#1e1a30;color:#a78bfa}
.group-header{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.gname{font-size:14px;font-weight:600}.gstats{font-size:12px;color:var(--muted)}
.rank-badge{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--accent);color:#fff;flex-shrink:0}
.ci-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.ci-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.ci-name{font-size:14px;font-weight:600}
.ci-pattern{font-size:12px;font-weight:600;padding:2px 10px;border-radius:20px;border:1px solid}
.eu-bar{display:flex;align-items:center;gap:8px;margin:6px 0}
.eu-label{font-size:11px;color:var(--muted);width:60px;flex-shrink:0}
.eu-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.eu-fill{height:100%;border-radius:3px}
.eu-num{font-size:11px;font-weight:600;width:26px;text-align:right;flex-shrink:0}
.trait-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.trait-tag{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--surface);border:1px solid var(--border);color:var(--muted)}
.stress-list{margin-top:8px}
.stress-item{font-size:11px;color:var(--yellow);padding:2px 0}
.stress-item::before{content:"⚠ "}
.ci-notes{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5;border-top:1px solid var(--border);padding-top:8px}
.ci-9box{font-size:12px;margin-top:8px;padding:6px 10px;background:var(--surface);border-radius:6px;border:1px solid var(--border)}
.admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.admin-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.admin-card h3{font-size:13px;font-weight:600;margin-bottom:10px}
.admin-field{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.admin-field:last-child{border-bottom:none}
.admin-field label{color:var(--muted)}
.admin-field input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:3px 8px;border-radius:4px;width:110px;font-size:12px;font-family:var(--font)}
.admin-save{margin-top:10px;background:var(--accent);border:none;color:#fff;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:var(--font);font-weight:500}
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="pw-gate" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 48px;width:100%;max-width:400px;text-align:center;box-shadow:0 8px 40px #00000060">
    <div style="font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px">Away<span style="color:var(--accent)">Day</span></div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:28px">OR Assessment Dashboard</div>
    <div style="margin-bottom:16px">
      <input id="pw-input" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPW()"
        style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:8px;font-size:14px;font-family:var(--font);outline:none;box-sizing:border-box">
    </div>
    <div id="pw-error" style="color:var(--red);font-size:12px;margin-bottom:12px;min-height:18px"></div>
    <button onclick="checkPW()" style="width:100%;background:var(--accent);border:none;color:#fff;padding:12px;border-radius:8px;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer">Access Dashboard</button>
  </div>
</div>
<!-- DASHBOARD -->
<div id="app" style="display:none">
<div class="topbar">
  <div class="logo">Away<span>Day</span></div>

    <button class="ntab" onclick="showPage('scorecard',this)">Scorecard</button>
    <button class="ntab" onclick="showPage('salary',this)">Salary</button>
    <button class="ntab" onclick="showPage('ci',this)">Culture Index</button>
    <button class="ntab" onclick="showPage('admin',this)">Admin</button>
  </div>
  <div class="emp-badge" id="emp-count">87 employees · 23 evaluators</div>
</div>

var charts={};
function mkChart(id,cfg){if(charts[id])charts[id].destroy();var c=document.getElementById(id);if(!c)return;charts[id]=new Chart(c.getContext('2d'),cfg)}
function pAvg(e){return e.scores.perfAvg||0}
function qAvg(e){return e.scores.potAvg||0}
function ov(e){return(pAvg(e)+qAvg(e))/2}
function cell9(p,q){var pr=p>=3.34?'H':p>=2.67?'M':'L';var qr=q>=3.34?'H':q>=2.67?'M':'L';return{HH:9,MH:8,LH:7,HM:6,MM:5,LM:4,HL:3,ML:2,LL:1}[pr+qr]||5}
function cell9rel(all,e){
  var ps=[...all].map(pAvg).sort((a,b)=>a-b);
  var qs=[...all].map(qAvg).sort((a,b)=>a-b);
  var n=all.length,pi=ps.lastIndexOf(pAvg(e)),qi=qs.lastIndexOf(qAvg(e));
  var pr=pi>=n*2/3?'H':pi>=n/3?'M':'L';
  var qr=qi>=n*2/3?'H':qi>=n/3?'M':'L';
  return{HH:9,MH:8,LH:7,HM:6,MM:5,LM:4,HL:3,ML:2,LL:1}[pr+qr]||5;
}
var cellNames={9:'Star',8:'Future Star',7:'Rough Diamond',6:'High Core',5:'Core Contributor',4:'Developing',3:'Underperformer+',2:'Underperformer',1:'At Risk'};
var cellColors={9:'#3ecf8e',8:'#4f8ef7',7:'#7c5fff',6:'#3ecf8e',5:'#a0a8c8',4:'#f5a623',3:'#ff7b39',2:'#f05252',1:'#c0392b'};
function bonusBadge(b){if(b===null||b===undefined)return '<span class="badge badge-blue">—</span>';if(b>=4)return '<span class="badge badge-green">'+b+'</span>';if(b>=3)return '<span class="badge badge-yellow">'+b+'</span>';if(b>=2)return '<span class="badge badge-orange">'+b+'</span>';return '<span class="badge badge-red">'+b+'</span>'}
function perfBadge(v){if(v===null||v===undefined||isNaN(v))return '—';var s=v.toFixed(2);if(v>=3.34)return '<span class="badge badge-green">'+s+'</span>';if(v>=2.67)return '<span class="badge badge-yellow">'+s+'</span>';return '<span class="badge badge-red">'+s+'</span>'}

/* OVERVIEW */
function renderOverview(){
  var el=document.getElementById('page-overview');
  var n=employees.length;
  var avgP=employees.reduce((s,e)=>s+pAvg(e),0)/n;
  var avgQ=employees.reduce((s,e)=>s+qAvg(e),0)/n;
  var stars=employees.filter(e=>cell9(pAvg(e),qAvg(e))>=8).length;
  var atRisk=employees.filter(e=>cell9(pAvg(e),qAvg(e))<=2).length;
  var evals=[...new Set(employees.map(e=>e.header.evaluator))];
  var patDist={};employees.forEach(e=>{var l=cellNames[cell9(pAvg(e),qAvg(e))];patDist[l]=(patDist[l]||0)+1});
  var order=[9,8,7,6,5,4,3,2,1].map(c=>cellNames[c]);
  var patLabels=order.filter(l=>patDist[l]);
  var regMap={};employees.forEach(e=>{var r=e.header.region||'—';regMap[r]=(regMap[r]||0)+1});
  el.innerHTML=`<div class="stat-row">
    <div class="stat"><div class="label">Total Employees</div><div class="val blue">${n}</div></div>
    <div class="stat"><div class="label">Evaluators</div><div class="val blue">${evals.length}</div></div>
    <div class="stat"><div class="label">Avg Performance</div><div class="val ${avgP>=3.34?'green':avgP>=2.67?'yellow':'red'}">${avgP.toFixed(2)}</div></div>
    <div class="stat"><div class="label">Avg Potential</div><div class="val ${avgQ>=3.34?'green':avgQ>=2.67?'yellow':'red'}">${avgQ.toFixed(2)}</div></div>
    <div class="stat"><div class="label">Stars (8–9)</div><div class="val green">${stars}</div></div>
    <div class="stat"><div class="label">At Risk (1–2)</div><div class="val ${atRisk>0?'red':'green'}">${atRisk}</div></div>
  </div>
  <div class="two-col">
    <div class="panel"><h2>9-Box Distribution</h2><div class="sub">Employee count by cell (absolute thresholds)</div><div class="chart-wrap"><canvas id="c-dist"></canvas></div></div>
    <div class="panel"><h2>By Region</h2><div class="sub">Headcount by region</div><div class="chart-wrap"><canvas id="c-reg"></canvas></div></div>
  </div>
  <div class="panel"><h2>Evaluator Summary</h2><div class="sub">Ranked by avg overall score</div>
    <table class="tbl"><thead><tr><th>#</th><th>Evaluator</th><th>Emps</th><th>Avg Perf</th><th>Avg Pot</th><th>Avg Overall</th><th>Stars</th><th>At Risk</th></tr></thead><tbody id="eval-tbl"></tbody></table>
  </div>`;
  setTimeout(()=>{
    var colMap={};[9,8,7,6,5,4,3,2,1].forEach(c=>colMap[cellNames[c]]=cellColors[c]);
    var totalEmp=employees.length;
    var distPlugin={id:'barPctLabels',afterDatasetsDraw:function(chart){var ctx=chart.ctx;chart.data.datasets.forEach(function(ds,di){chart.getDatasetMeta(di).data.forEach(function(bar,i){var v=ds.data[i];if(!v)return;var pct=(v/totalEmp*100).toFixed(1)+'%';ctx.save();ctx.font='bold 10px DM Sans,system-ui,sans-serif';ctx.fillStyle='rgba(255,255,255,0.85)';ctx.textAlign='center';ctx.textBaseline='middle';var x=bar.x,top=bar.y,bottom=bar.base,mid=(top+bottom)/2;if(bottom-top>14)ctx.fillText(pct,x,mid);ctx.restore()})});}};
    mkChart('c-dist',{type:'bar',data:{labels:patLabels,datasets:[{data:patLabels.map(l=>patDist[l]),backgroundColor:patLabels.map(l=>colMap[l]+'99'),borderColor:patLabels.map(l=>colMap[l]),borderWidth:1,borderRadius:4}]},options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{var v=ctx.parsed.y;var pct=(v/totalEmp*100).toFixed(1);return` ${v} employees (${pct}% of total)`}}}},scales:{x:{ticks:{color:'#7b82a0',font:{size:10}}},y:{ticks:{color:'#7b82a0',stepSize:1},beginAtZero:true}},responsive:true,maintainAspectRatio:false},plugins:[distPlugin]});
    var rKeys=Object.keys(regMap).sort((a,b)=>regMap[b]-regMap[a]);
    mkChart('c-reg',{type:'doughnut',data:{labels:rKeys,datasets:[{data:rKeys.map(k=>regMap[k]),backgroundColor:['#4f8ef7','#3ecf8e','#7c5fff','#f5a623','#ff7b39','#f05252','#60a5fa','#a78bfa','#34d399','#fb923c'],borderColor:'#1e2230',borderWidth:2}]},options:{plugins:{legend:{position:'right',labels:{color:'#7b82a0',font:{size:11}}}},responsive:true,maintainAspectRatio:false}});
  },50);
  var rows=evals.map(ev=>{
    var emps=employees.filter(e=>e.header.evaluator===ev);
    var ap=emps.reduce((s,e)=>s+pAvg(e),0)/emps.length;
    var aq=emps.reduce((s,e)=>s+qAvg(e),0)/emps.length;
    var ao=(ap+aq)/2;
    return{ev,n:emps.length,ap,aq,ao,st:emps.filter(e=>cell9(pAvg(e),qAvg(e))>=8).length,ar:emps.filter(e=>cell9(pAvg(e),qAvg(e))<=2).length};
  }).sort((a,b)=>b.ao-a.ao);
  document.getElementById('eval-tbl').innerHTML=rows.map((r,i)=>`<tr><td style="color:var(--muted)">${i+1}</td><td><strong>${r.ev}</strong></td><td>${r.n}</td><td>${perfBadge(r.ap)}</td><td>${perfBadge(r.aq)}</td><td>${perfBadge(r.ao)}</td><td>${r.st>0?'<span class="badge badge-green">'+r.st+'</span>':'0'}</td><td>${r.ar>0?'<span class="badge badge-red">'+r.ar+'</span>':'0'}</td></tr>`).join('');
}

/* NINEBOX */
function renderNinebox(){buildNinebox(document.getElementById('page-ninebox'),false)}
function renderNineboxRel(){buildNinebox(document.getElementById('page-nineboxrel'),true)}
function buildNinebox(el,rel){
  var cells={};for(var i=1;i<=9;i++)cells[i]=[];
  employees.forEach(e=>{var c=rel?cell9rel(employees,e):cell9(pAvg(e),qAvg(e));cells[c].push(e)});
  var layout=[[7,8,9],[4,5,6],[1,2,3]];
  var colLbls=['Low Performance','Mid Performance','High Performance'];
  var rowLbls=['High Potential','Mid Potential','Low Potential'];
  var html=`<div class="panel"><h2>9-Box: ${rel?'Relative':'Absolute'}</h2><div class="sub">${rel?'Relative placement — top/mid/bottom thirds within this group':'Fixed thresholds: Low <2.67 | Mid 2.67–3.34 | High ≥3.34'}</div>
  <div style="display:grid;grid-template-columns:36px 1fr;gap:4px">
    <div style="display:grid;grid-template-rows:22px repeat(3,1fr)">
      <div></div>
      ${rowLbls.map(l=>`<div style="writing-mode:vertical-rl;transform:rotate(180deg);font-size:10px;color:var(--muted);display:flex;align-items:center;justify-content:center">${l}</div>`).join('')}
    </div>
    <div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);text-align:center;font-size:11px;color:var(--muted);margin-bottom:4px">${colLbls.map(l=>`<div>${l}</div>`).join('')}</div>
      <div class="ninebox">`;
  layout.forEach(row=>{row.forEach(c=>{
    var emps=cells[c]||[];
    html+=`<div class="nb-cell cell-color-${c}">
      <div class="nb-cell-label" style="color:${cellColors[c]}">${cellNames[c]}</div>
      <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:5px">
        <span style="font-size:18px;font-weight:700;color:${cellColors[c]};line-height:1">${emps.length}</span>
        <span style="font-size:10px;color:${cellColors[c]}99;font-weight:600">${employees.length>0?(emps.length/employees.length*100).toFixed(1)+'%':''}</span>
      </div>
      <div class="nb-dots">${emps.map(e=>`<div class="nb-dot" style="background:${cellColors[c]}" data-tip="${e.header.name} | P:${pAvg(e).toFixed(2)} Q:${qAvg(e).toFixed(2)} | ${e.header.evaluator}"></div>`).join('')}</div>
    </div>`;
  })});
  html+=`</div></div></div></div>`;
  var sorted=[...employees].sort((a,b)=>ov(b)-ov(a));
  html+=`<div class="panel"><h2>All Employees — Ranked</h2><table class="tbl"><thead><tr><th>#</th><th>Name</th><th>Pos</th><th>Shop</th><th>Region</th><th>Evaluator</th><th>Perf</th><th>Pot</th><th>Bonus</th><th>Cell</th></tr></thead><tbody>`;
  sorted.forEach((e,i)=>{var c=rel?cell9rel(employees,e):cell9(pAvg(e),qAvg(e));
    html+=`<tr><td style="color:var(--muted)">${i+1}</td><td><strong>${e.header.name}</strong></td><td>${e.header.position||'—'}</td><td>${e.header.shop||'—'}</td><td>${e.header.region||'—'}</td><td>${e.header.evaluator}</td><td>${perfBadge(pAvg(e))}</td><td>${perfBadge(qAvg(e))}</td><td>${bonusBadge(e.scores.bonus)}</td><td><span style="color:${cellColors[c]};font-weight:600">${c}·${cellNames[c]}</span></td></tr>`;
  });
  html+=`</tbody></table></div>`;
  el.innerHTML=html;
}

/* SCORECARD */
function renderScorecard(){
  var el=document.getElementById('page-scorecard');
  var evals=[...new Set(employees.map(e=>e.header.evaluator))];
  var groups=evals.map(ev=>{
    var emps=employees.filter(e=>e.header.evaluator===ev);
    var ap=emps.reduce((s,e)=>s+pAvg(e),0)/emps.length;
    var aq=emps.reduce((s,e)=>s+qAvg(e),0)/emps.length;
    return{ev,emps,ap,aq,ao:(ap+aq)/2};
  }).sort((a,b)=>b.ao-a.ao);
  var html=`<div class="panel"><h2>Scorecard — All Teams</h2><div class="sub">21 evaluators ranked by avg overall score</div>`;
  groups.forEach((g,gi)=>{
    var sorted=[...g.emps].sort((a,b)=>ov(b)-ov(a));
    html+=`<div style="margin-bottom:20px">
      <div class="group-header">
        <div style="display:flex;align-items:center;gap:10px"><div class="rank-badge">${gi+1}</div><div class="gname">${g.ev}</div></div>
        <div class="gstats">Overall: <strong>${g.ao.toFixed(2)}</strong> &nbsp; Perf: <strong>${g.ap.toFixed(2)}</strong> &nbsp; Pot: <strong>${g.aq.toFixed(2)}</strong> &nbsp; (${g.emps.length} emp)</div>
      </div>
      <table class="tbl"><thead><tr><th>#</th><th>Name</th><th>Pos</th><th>Shop</th><th>Region</th><th>Perf</th><th>Pot</th><th>Overall</th><th>Bonus</th><th>Cell</th></tr></thead><tbody>
      ${sorted.map((e,i)=>{var c=cell9(pAvg(e),qAvg(e));return`<tr><td style="color:var(--muted)">${i+1}</td><td><strong>${e.header.name}</strong></td><td>${e.header.position||'—'}</td><td>${e.header.shop||'—'}</td><td>${e.header.region||'—'}</td><td>${perfBadge(pAvg(e))}</td><td>${perfBadge(qAvg(e))}</td><td>${perfBadge(ov(e))}</td><td>${bonusBadge(e.scores.bonus)}</td><td><span style="color:${cellColors[c]};font-weight:600">${c}·${cellNames[c]}</span></td></tr>`}).join('')}
      </tbody></table></div>`;
  });
  html+=`</div>`;
  el.innerHTML=html;
}

  var avg=ws.reduce((s,e)=>s+e.header.salary,0)/ws.length;

/* CULTURE INDEX */
var CI_PATTERN_COLORS={'Rainmaker':'#f5a623','Scholar':'#4f8ef7','Coordinator':'#3ecf8e','Craftsman':'#7c5fff','Socializer':'#ff7b39','Facilitator':'#f05252','Persuader':'#a78bfa','Influencer':'#34d399','Operator':'#fb923c','Philosopher':'#60a5fa','Debater':'#f472b6','Architect':'#a3e635'};
function ciGapBadge(g){if(g<=5)return '<span class="badge badge-green">Well Aligned</span>';if(g<=15)return '<span class="badge badge-yellow">Slight Stretch</span>';if(g<=25)return '<span class="badge badge-orange">Moderate Stretch</span>';return '<span class="badge badge-red">High Stress Risk</span>'}
function renderCI(){
  var el=document.getElementById('page-ci');
  var empMap={};employees.forEach(function(e){empMap[e.header.name]=e});
  var matched=CI_DATA.filter(function(c){return empMap[c.name]}).map(function(c){
    var e=empMap[c.name];
    return{name:c.name,pattern:c.pattern,traits_eu:c.traits_eu,jobs_eu:c.jobs_eu,
      gap:Math.abs(c.traits_eu-c.jobs_eu),
      gapDir:c.jobs_eu>c.traits_eu?'upward':'downward',
      perf:pAvg(e),pot:qAvg(e),overall:(pAvg(e)+qAvg(e))/2,bonus:e.scores.bonus,ci:c,emp:e};
  });
  var avgGap=(CI_DATA.reduce(function(s,c){return s+Math.abs(c.traits_eu-c.jobs_eu)},0)/CI_DATA.length).toFixed(1);
  var highRisk=CI_DATA.filter(function(c){return Math.abs(c.traits_eu-c.jobs_eu)>25}).length;
  var patMap={};CI_DATA.forEach(function(c){patMap[c.pattern]=(patMap[c.pattern]||0)+1});
  var patKeys=Object.keys(patMap);

  // Pattern performance table (matched only)
  var byPattern={};
  matched.forEach(function(m){if(!byPattern[m.pattern])byPattern[m.pattern]=[];byPattern[m.pattern].push(m)});
  var patPerf=Object.keys(byPattern).map(function(p){
    var items=byPattern[p];
    return{pat:p,n:items.length,
      avgP:items.reduce(function(s,i){return s+i.perf},0)/items.length,
      avgQ:items.reduce(function(s,i){return s+i.pot},0)/items.length,
      avgO:items.reduce(function(s,i){return s+i.overall},0)/items.length,
      avgGap:items.reduce(function(s,i){return s+i.gap},0)/items.length};
  }).sort(function(a,b){return b.avgO-a.avgO});

  // EU gap bucket analysis
  var gapBuckets=[
    {label:'Well Aligned (0–5)',lo:0,hi:5},
    {label:'Slight Stretch (6–15)',lo:6,hi:15},
    {label:'Moderate Stretch (16–25)',lo:16,hi:25},
    {label:'High Stress Risk (26+)',lo:26,hi:999}
  ].map(function(b){
    var items=matched.filter(function(m){return m.gap>=b.lo&&m.gap<=b.hi});
    return{label:b.label,n:items.length,
      avgP:items.length?items.reduce(function(s,i){return s+i.perf},0)/items.length:null,
      avgQ:items.length?items.reduce(function(s,i){return s+i.pot},0)/items.length:null};
  });

  el.innerHTML=`<div class="stat-row">
    <div class="stat"><div class="label">CI Profiles</div><div class="val blue">${CI_DATA.length}</div></div>
    <div class="stat"><div class="label">Matched to 9-Box</div><div class="val green">${matched.length}</div></div>
    <div class="stat"><div class="label">Avg EU Gap</div><div class="val ${avgGap>20?'red':avgGap>10?'yellow':'green'}">${avgGap}</div></div>
    <div class="stat"><div class="label">High Stress Risk</div><div class="val ${highRisk>0?'red':'green'}">${highRisk}</div></div>
  </div>

  <div class="panel" style="border-left:3px solid var(--accent)">
    <h2>🔍 Correlation Findings</h2>
    <div class="sub">Based on ${matched.length} employees with both a CI profile and a completed 9-Box assessment</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:14px">
      <div style="background:var(--surface2);border-radius:8px;padding:12px 14px;border:1px solid var(--border)">
        <div style="font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Pattern → Performance</div>
        <div style="font-size:12px;color:var(--text);line-height:1.7">
          <strong style="color:var(--green)">Coordinators</strong> and <strong style="color:var(--green)">Influencers</strong> are the top performers (avg overall 3.47 and 3.28). Both patterns are structured, people-oriented, and service-focused — well suited to the ORM role.<br><br>
          <strong style="color:var(--red)">Persuaders</strong> and <strong style="color:var(--red)">Scholars</strong> score lowest (1.89 and 2.33). Persuaders are high-energy generalists who resist repetitive structure; Scholars are reserved and analytical — neither is a natural fit for an owner-facing relationship role.
        </div>
      </div>
      <div style="background:var(--surface2);border-radius:8px;padding:12px 14px;border:1px solid var(--border)">
        <div style="font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">EU Gap → Performance</div>
        <div style="font-size:12px;color:var(--text);line-height:1.7">
          A <strong>slight stretch (6–15 gap)</strong> correlates with the <strong style="color:var(--green)">highest scores</strong> (avg perf 3.09, pot 3.31) — suggesting that employees who push modestly beyond their natural style are energized by growth.<br><br>
          <strong>Well aligned (0–5)</strong> employees perform solidly (2.92) but don't lead the group. <strong style="color:var(--red)">Moderate and high-stress gaps (16+)</strong> consistently correlate with lower scores and lower potential ratings, suggesting the behavioral stretch is a drag on effectiveness.
        </div>
      </div>
      <div style="background:var(--surface2);border-radius:8px;padding:12px 14px;border:1px solid var(--border)">
        <div style="font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Key Risk Flags</div>
        <div style="font-size:12px;color:var(--text);line-height:1.7">
          <strong style="color:var(--red)">Angel Afalava</strong> — Facilitator with the largest gap (48), scores at the floor (2.00/2.00). CI predicted morale and underutilization risk; 9-Box confirms it.<br><br>
          <strong style="color:var(--red)">Tanya Bottorf</strong> — Persuader with a 23-point downward gap and the lowest performance score (1.67). High-energy profile forced into a structured role is a significant retention and performance risk.<br><br>
          <strong style="color:var(--yellow)">Danica Byers</strong> — Scholar with a 24-point upward stretch. Scoring 2.44/2.22 — below the team average on both dimensions.
        </div>
      </div>
    </div>
  </div>

  <div class="two-col">
    <div class="panel">
      <h2>Performance by CI Pattern</h2>
      <div class="sub">Avg performance and potential scores — matched employees only (n=${matched.length})</div>
      <div class="chart-wrap" style="height:240px"><canvas id="c-ci-patperf"></canvas></div>
    </div>
    <div class="panel">
      <h2>EU Gap Bucket vs Performance</h2>
      <div class="sub">How alignment between natural traits and job demands affects scores</div>
      <div class="chart-wrap" style="height:240px"><canvas id="c-ci-gapbkt"></canvas></div>
    </div>
  </div>

  <div class="two-col">
    <div class="panel">
      <h2>CI Pattern Distribution</h2>
      <div class="sub">All 92 CI profiles on file</div>
      <div class="chart-wrap"><canvas id="c-ci-pat"></canvas></div>
    </div>
    <div class="panel">
      <h2>EU Gap vs Performance</h2>
      <div class="sub">Each dot = one matched employee — hover for name</div>
      <div class="chart-wrap"><canvas id="c-ci-sc"></canvas></div>
    </div>
  </div>

  <div class="panel">
    <h2>Pattern Correlation Table</h2>
    <div class="sub">Matched employees only — sorted by avg overall score</div>
    <table class="tbl"><thead><tr><th>CI Pattern</th><th>n</th><th>Avg Perf</th><th>Avg Pot</th><th>Avg Overall</th><th>Avg EU Gap</th><th>Employees</th></tr></thead>
    <tbody id="ci-pat-tbl"></tbody></table>
  </div>

  <div class="panel">
    <h2>EU Gap Bucket Analysis</h2>
    <div class="sub">Performance outcomes by degree of behavioral stretch</div>
    <table class="tbl"><thead><tr><th>Alignment Band</th><th>n</th><th>Avg Perf</th><th>Avg Pot</th></tr></thead>
    <tbody>${gapBuckets.map(function(b){
      return '<tr><td><strong>'+b.label+'</strong></td><td>'+b.n+'</td><td>'+(b.n?perfBadge(b.avgP):'—')+'</td><td>'+(b.n?perfBadge(b.avgQ):'—')+'</td></tr>';
    }).join('')}</tbody></table>
  </div>

  <div class="panel"><h2>Individual CI Profiles</h2><div class="sub">${CI_DATA.length} profiles sorted by EU gap (highest risk first)</div><div id="ci-cards"></div></div>`;

  // Populate pattern table
  document.getElementById('ci-pat-tbl').innerHTML=patPerf.map(function(r){
    var col=CI_PATTERN_COLORS[r.pat]||'#4f8ef7';
    var names=byPattern[r.pat].map(function(i){return i.name}).join(', ');
    return '<tr><td><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+col+';margin-right:6px"></span><strong>'+r.pat+'</strong></td>'
      +'<td>'+r.n+'</td><td>'+perfBadge(r.avgP)+'</td><td>'+perfBadge(r.avgQ)+'</td><td>'+perfBadge(r.avgO)+'</td>'
      +'<td><span style="color:'+( r.avgGap>25?'var(--red)':r.avgGap>15?'var(--orange)':r.avgGap>5?'var(--yellow)':'var(--green)')+'">'+r.avgGap.toFixed(1)+'</span></td>'
      +'<td style="font-size:11px;color:var(--muted)">'+names+'</td></tr>';
  }).join('');

  setTimeout(function(){
    // Pattern performance grouped bar
    var patPerfLabels=patPerf.map(function(r){return r.pat});
    mkChart('c-ci-patperf',{type:'bar',data:{labels:patPerfLabels,datasets:[
      {label:'Performance',data:patPerf.map(function(r){return r.avgP}),backgroundColor:patPerfLabels.map(function(p){return(CI_PATTERN_COLORS[p]||'#4f8ef7')+'99'}),borderColor:patPerfLabels.map(function(p){return CI_PATTERN_COLORS[p]||'#4f8ef7'}),borderWidth:1,borderRadius:3},
      {label:'Potential',data:patPerf.map(function(r){return r.avgQ}),backgroundColor:'#ffffff22',borderColor:'#ffffff66',borderWidth:1,borderRadius:3,borderDash:[4,2]}
    ]},options:{plugins:{legend:{labels:{color:'#7b82a0',font:{size:11}}},tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': '+ctx.parsed.y.toFixed(2)}}}},scales:{x:{ticks:{color:'#7b82a0',font:{size:10}}},y:{min:1,max:4,ticks:{color:'#7b82a0'},beginAtZero:false}},responsive:true,maintainAspectRatio:false}});

    // Gap bucket bar
    var bktFilled=gapBuckets.filter(function(b){return b.n>0});
    mkChart('c-ci-gapbkt',{type:'bar',data:{labels:bktFilled.map(function(b){return b.label}),datasets:[
      {label:'Avg Performance',data:bktFilled.map(function(b){return b.avgP}),backgroundColor:['#3ecf8e99','#4f8ef799','#ff7b3999','#f0525299'],borderColor:['#3ecf8e','#4f8ef7','#ff7b39','#f05252'],borderWidth:1,borderRadius:3},
      {label:'Avg Potential',data:bktFilled.map(function(b){return b.avgQ}),backgroundColor:'#ffffff22',borderColor:'#ffffff66',borderWidth:1,borderRadius:3}
    ]},options:{plugins:{legend:{labels:{color:'#7b82a0',font:{size:11}}},tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': '+ctx.parsed.y.toFixed(2)}}}},scales:{x:{ticks:{color:'#7b82a0',font:{size:10}}},y:{min:1,max:4,ticks:{color:'#7b82a0'},beginAtZero:false}},responsive:true,maintainAspectRatio:false}});

    // Doughnut
    mkChart('c-ci-pat',{type:'doughnut',data:{labels:patKeys,datasets:[{data:patKeys.map(function(k){return patMap[k]}),backgroundColor:patKeys.map(function(k){return CI_PATTERN_COLORS[k]||'#4f8ef7'}),borderColor:'#1e2230',borderWidth:2}]},options:{plugins:{legend:{position:'right',labels:{color:'#7b82a0',font:{size:11}}}},responsive:true,maintainAspectRatio:false}});

    // Scatter
    var pts=matched.map(function(m){return{x:m.gap,y:m.perf,label:m.name,pat:m.pattern}});
    if(pts.length>0)mkChart('c-ci-sc',{type:'scatter',data:{datasets:[{data:pts,backgroundColor:pts.map(function(p){return(CI_PATTERN_COLORS[p.pat]||'#4f8ef7')+'99'}),borderColor:pts.map(function(p){return CI_PATTERN_COLORS[p.pat]||'#4f8ef7'}),pointRadius:7,pointHoverRadius:10}]},options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:function(d){return d.raw.label+' ('+d.raw.pat+') Gap:'+d.raw.x+' Perf:'+d.raw.y.toFixed(2)}}}},scales:{x:{title:{display:true,text:'EU Gap',color:'#7b82a0'},ticks:{color:'#7b82a0'}},y:{title:{display:true,text:'Performance',color:'#7b82a0'},ticks:{color:'#7b82a0'},min:1,max:4.5}},responsive:true,maintainAspectRatio:false}});
  },50);

  var sortedCI=[...CI_DATA].sort(function(a,b){return Math.abs(b.traits_eu-b.jobs_eu)-Math.abs(a.traits_eu-a.jobs_eu)});
  document.getElementById('ci-cards').innerHTML=sortedCI.map(function(c){
    var gap=Math.abs(c.traits_eu-c.jobs_eu);
    var col=CI_PATTERN_COLORS[c.pattern]||'#4f8ef7';
    var emp=empMap[c.name];
    var nineInfo=emp?('<div class="ci-9box">9-Box — Perf: <strong>'+pAvg(emp).toFixed(2)+'</strong> | Pot: <strong>'+qAvg(emp).toFixed(2)+'</strong> | Cell: <strong style="color:'+cellColors[cell9(pAvg(emp),qAvg(emp))]+'">'+cell9(pAvg(emp),qAvg(emp))+' · '+cellNames[cell9(pAvg(emp),qAvg(emp))]+'</strong> | Evaluator: '+emp.header.evaluator+'</div>'):'<div style="font-size:11px;color:var(--muted);margin-top:6px">No 9-Box match on file</div>';
    return '<div class="ci-card">'
      +'<div class="ci-card-header"><div><div class="ci-name">'+c.name+'</div><div style="font-size:11px;color:var(--muted);margin-top:2px">'+c.survey_type+' · '+c.survey_date+'</div></div>'
      +'<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap"><span class="ci-pattern" style="color:'+col+';border-color:'+col+'40;background:'+col+'15">'+c.pattern+'</span>'+ciGapBadge(gap)+'</div></div>'
      +'<div class="eu-bar"><div class="eu-label">Traits EU</div><div class="eu-track"><div class="eu-fill" style="width:'+Math.min(c.traits_eu*100/70,100)+'%;background:'+col+'"></div></div><div class="eu-num">'+c.traits_eu+'</div></div>'
      +'<div class="eu-bar"><div class="eu-label">Job EU</div><div class="eu-track"><div class="eu-fill" style="width:'+Math.min(c.jobs_eu*100/70,100)+'%;background:#7b82a0"></div></div><div class="eu-num">'+c.jobs_eu+'</div></div>'
      +'<div style="font-size:11px;color:var(--muted);margin-top:2px">EU Gap: <strong style="color:'+(gap>25?'var(--red)':gap>15?'var(--orange)':gap>5?'var(--yellow)':'var(--green)')+'">'+gap+'</strong></div>'
      +'<div class="trait-tags">'+c.key_traits.map(function(t){return'<span class="trait-tag">'+t+'</span>'}).join('')+'</div>'
      +(c.stress.length?'<div class="stress-list">'+c.stress.map(function(s){return'<div class="stress-item">'+s+'</div>'}).join('')+'</div>':'')
      +'<div class="ci-notes">'+c.notes+'</div>'
      +nineInfo+'</div>';
  }).join('');
}
